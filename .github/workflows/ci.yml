name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Fast lane: orchestration-only build, no ML deps. Catches anything that
  # breaks the core library on macOS, Linux, or Windows.
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        # Windows runners default to the Visual Studio (multi-config) generator,
        # which ignores CMAKE_BUILD_TYPE at configure time — we pass --config on
        # build and test instead, below.
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  # Heavy lane: ONNX-on build with the Linux example (libspeech.so + demo +
  # tools + C-ABI integration test). Exercises the speech_core_models target,
  # the examples/linux subtree, and ALSA linkage. Integration tests that
  # need real model files skip cleanly (we don't download ~1.2 GB in CI).
  linux-examples:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential cmake libasound2-dev curl ca-certificates

      - name: Download ONNX Runtime
        run: |
          ./examples/linux/setup_linux.sh
          ls -la ort-linux/include/onnxruntime_c_api.h
          ls -la ort-linux/lib/libonnxruntime.so

      - name: Configure
        run: |
          cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DSPEECH_CORE_WITH_ONNX=ON \
              -DSPEECH_CORE_BUILD_EXAMPLES=ON \
              -DORT_DIR=ort-linux

      - name: Build
        run: cmake --build build --parallel

      - name: Verify artefacts
        run: |
          file build/libspeech_core.a
          file build/libspeech_core_models.a
          file build/examples/linux/libspeech.so
          file build/examples/linux/speech_demo
          file build/examples/linux/speech_transcribe
          file build/examples/linux/speech_synthesize
          file build/examples/linux/speech_phonemize
          # ALSA must actually be linked (the message "ALSA not found"
          # would mean we built a no-op stub instead of the real demo).
          ldd build/examples/linux/speech_demo | grep -q libasound

      - name: Test
        # Integration tests (test_models, speech_linux_pipeline) skip
        # cleanly when SPEECH_MODEL_DIR isn't set; everything else runs.
        run: ctest --test-dir build --output-on-failure

  # LiteRT build lanes — prove the speech_core_models_litert target compiles
  # and links against a real libLiteRt on Linux and Windows. The runtime is
  # extracted from Google's ai-edge-litert PyPI wheel by scripts/fetch_litert.sh;
  # headers are vendored in third_party/litert/ and committed to the repo.
  # test_litert_models skips at runtime when SPEECH_LITERT_MODEL_DIR isn't
  # set, so these lanes don't pay for ~700 MB of .tflite downloads per PR —
  # the nightly / weekly-voxcpm2 workflows do that.
  linux-litert:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential cmake curl ca-certificates unzip

      - name: Fetch libLiteRt from ai-edge-litert wheel
        run: |
          ./scripts/fetch_litert.sh "$PWD/litert"
          test -f litert/libLiteRt.so

      - name: Configure
        run: |
          cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DSPEECH_CORE_WITH_LITERT=ON \
              -DLITERT_DIR=$PWD/litert

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        # test_litert_models skips when SPEECH_LITERT_MODEL_DIR isn't set;
        # the other unit tests run normally. LD_LIBRARY_PATH so the dynamic
        # loader can find libLiteRt.so when ctest launches the test exe.
        run: |
          export LD_LIBRARY_PATH="$PWD/litert:${LD_LIBRARY_PATH:-}"
          ctest --test-dir build --output-on-failure

  windows-litert:
    runs-on: windows-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Puts MSVC dumpbin + lib in PATH so fetch_litert.sh can generate the
      # import library from the runtime DLL (Google's wheel doesn't ship one).
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Fetch libLiteRt from ai-edge-litert wheel
        shell: bash
        run: |
          ./scripts/fetch_litert.sh "$PWD/litert"
          test -f litert/libLiteRt.dll
          test -f litert/libLiteRt.lib

      - name: Configure
        shell: bash
        run: |
          cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DSPEECH_CORE_WITH_LITERT=ON \
              -DLITERT_DIR=$PWD/litert

      - name: Build
        shell: bash
        run: cmake --build build --parallel --config Release

      - name: Test
        # Windows uses PATH for DLL resolution; prepend the litert dir so
        # libLiteRt.dll resolves when ctest launches the test exe.
        shell: bash
        run: |
          export PATH="$PWD/litert:$PATH"
          ctest --test-dir build --output-on-failure -C Release

  # aarch64 cross-compile — proves the Yocto/automotive path still compiles
  # after every change. Build-only (GitHub runners are x86_64; we don't try
  # to execute the cross binaries). The Yocto-specific toolchain file reads
  # $CC/$CXX/$SDKTARGETSYSROOT from environment-setup-* scripts; on CI we
  # instead pass the cross compilers directly to CMake.
  linux-examples-aarch64:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Install cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              g++-aarch64-linux-gnu \
              gcc-aarch64-linux-gnu \
              cmake \
              curl \
              ca-certificates

      - name: Download ONNX Runtime (aarch64)
        run: |
          ./examples/linux/setup_linux.sh aarch64
          file ort-linux/lib/libonnxruntime.so | grep -q "aarch64"

      - name: Configure
        run: |
          cmake -B build-aarch64 \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
              -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
              -DCMAKE_SYSTEM_NAME=Linux \
              -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
              -DSPEECH_CORE_WITH_ONNX=ON \
              -DSPEECH_CORE_BUILD_EXAMPLES=ON \
              -DSPEECH_CORE_BUILD_TESTS=OFF \
              -DSPEECH_LINUX_BUILD_DEMO=OFF \
              -DSPEECH_LINUX_BUILD_TESTS=OFF \
              -DORT_DIR=ort-linux

      - name: Build
        run: cmake --build build-aarch64 --parallel

      - name: Verify aarch64 artefacts
        run: |
          file build-aarch64/libspeech_core.a
          file build-aarch64/libspeech_core_models.a
          file build-aarch64/examples/linux/libspeech.so | tee /dev/stderr | grep -q "aarch64"
          file build-aarch64/examples/linux/speech_transcribe | tee /dev/stderr | grep -q "aarch64"

  # CUDA build-only — proves SPEECH_CORE_WITH_CUDA=ON configures and builds
  # against the GPU-enabled onnxruntime prebuild. GitHub-hosted runners don't
  # have GPUs so we can't actually run the CUDA EP, but compilation alone
  # catches the regressions we care most about: API drift in onnx_engine.h's
  # CUDA paths (CreateCUDAProviderOptions, SessionOptionsAppendExecutionProvider_*),
  # the Windows ORTCHAR_T = wchar_t path conversion, and the V2 provider
  # opaque-options surface. Run on Linux because the GPU prebuild is small
  # and the same source paths compile with -DSPEECH_CORE_WITH_CUDA on every
  # platform; Windows native ORT-GPU compilation is exercised locally by
  # dev hosts and via the weekly's optional Windows lane (when added).
  linux-cuda-buildonly:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential cmake curl ca-certificates

      - name: Download ONNX Runtime GPU prebuild
        # Microsoft's GPU prebuild ships CUDA + TensorRT EP shared libraries
        # alongside libonnxruntime.so — the libraries our SPEECH_CORE_WITH_CUDA
        # branch link-references via the V2 provider API. We pin a recent
        # release (matches the desktop dev defaults); bump as needed.
        run: |
          ORT_VERSION=1.20.1
          curl -L --retry 3 -o ort-gpu.tgz \
              "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-gpu-${ORT_VERSION}.tgz"
          mkdir -p ort-linux-gpu
          tar xf ort-gpu.tgz -C ort-linux-gpu --strip-components=1
          test -f ort-linux-gpu/include/onnxruntime_c_api.h
          test -f ort-linux-gpu/lib/libonnxruntime.so
          # Confirm the CUDA EP is in the bundle — without it our build would
          # link clean but our GPU code path would be dead at runtime, so
          # catching its absence here surfaces the issue before nightly.
          test -f ort-linux-gpu/lib/libonnxruntime_providers_cuda.so

      - name: Configure (CUDA-enabled)
        run: |
          cmake -B build-cuda \
              -DCMAKE_BUILD_TYPE=Release \
              -DSPEECH_CORE_WITH_ONNX=ON \
              -DSPEECH_CORE_WITH_CUDA=ON \
              -DORT_DIR=$PWD/ort-linux-gpu

      - name: Build
        run: cmake --build build-cuda --parallel

      - name: Verify CUDA symbols compiled in
        run: |
          # SPEECH_CORE_WITH_CUDA gets baked into speech_core_models via the
          # CMake target_compile_definitions. We can't easily probe the
          # macro itself in a static lib, but we can confirm the GPU EP
          # provider-options symbols got referenced — they only appear if
          # try_append_gpu() was compiled in. nm will show "U" (undefined)
          # references that the loader resolves to libonnxruntime at runtime.
          nm -u build-cuda/libspeech_core_models.a | grep -q "CreateCUDAProviderOptions" \
              && echo "OK: CUDA EP symbols referenced"
