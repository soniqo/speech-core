name: Weekly VoxCPM2 integration

# End-to-end VoxCPM2 synthesis test with a semantic round-trip:
#   text → VoxCPM2 (LiteRT) → WAV → Parakeet STT (ONNX) → string match
#
# Separate from .github/workflows/nightly.yml because the VoxCPM2 bundle is
# ~4.6 GB and AR inference is slow; weekly catches regressions without
# adding daily cache pressure. Uses our own Parakeet ORT wrapper for the
# ASR side — no external dependency (no Whisper, no Python ASR install).

on:
  schedule:
    - cron: '0 6 * * 1'   # 06:00 UTC every Monday
  workflow_dispatch:

jobs:
  voxcpm2-roundtrip:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential cmake libasound2-dev curl ca-certificates unzip

      # --- Caches ---
      - name: Cache LiteRT runtime
        uses: actions/cache@v4
        with:
          path: litert
          key: litert-aiedge2.1.5-${{ hashFiles('scripts/fetch_litert.sh') }}

      # ONNX Runtime + Parakeet ORT models (cache from the nightly pattern).
      - name: Cache ONNX Runtime + Parakeet models
        uses: actions/cache@v4
        with:
          path: |
            ort-linux
            scripts/models
          key: ort-models-${{ hashFiles('examples/linux/setup_linux.sh', 'scripts/download_models.sh') }}

      # VoxCPM2 bundle (~4.6 GB) — kept on its own key so changes to other
      # download scripts don't blow it away.
      - name: Cache VoxCPM2 bundle
        uses: actions/cache@v4
        with:
          path: scripts/models-voxcpm2
          key: voxcpm2-bundle-${{ hashFiles('scripts/download_voxcpm2_litert.sh') }}

      # --- Downloads (idempotent — skip when cache hit) ---
      - name: Fetch libLiteRt from ai-edge-litert wheel
        run: |
          if [ ! -f litert/libLiteRt.so ]; then
              ./scripts/fetch_litert.sh "$PWD/litert"
          fi
          test -f litert/libLiteRt.so

      - name: Download ONNX Runtime + Parakeet models
        run: |
          if [ ! -f ort-linux/lib/libonnxruntime.so ]; then
              ./examples/linux/setup_linux.sh
          fi
          if [ ! -f scripts/models/parakeet-encoder-int8.onnx ]; then
              ./scripts/download_models.sh
          fi
          test -f ort-linux/lib/libonnxruntime.so
          test -f scripts/models/parakeet-encoder-int8.onnx
          test -f scripts/models/parakeet-decoder-joint-int8.onnx

      - name: Download VoxCPM2 bundle
        run: |
          if [ ! -f scripts/models-voxcpm2/voxcpm2-token-step.tflite ]; then
              ./scripts/download_voxcpm2_litert.sh
          fi
          test -f scripts/models-voxcpm2/voxcpm2-text-prefill.tflite
          test -f scripts/models-voxcpm2/voxcpm2-token-step.tflite
          test -f scripts/models-voxcpm2/tokenizer.json

      # --- Build with BOTH backends so speech_transcribe (ORT) is available
      # alongside the LiteRT model suite. ---
      - name: Configure
        run: |
          cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DSPEECH_CORE_WITH_LITERT=ON \
              -DLITERT_DIR=$PWD/litert \
              -DSPEECH_CORE_WITH_ONNX=ON \
              -DORT_DIR=ort-linux \
              -DSPEECH_CORE_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build --parallel

      # --- Synthesise via the LiteRT VoxCPM2 wrapper, dump WAV. ---
      - name: Synthesise WAV (VoxCPM2 via LiteRT)
        env:
          SPEECH_LITERT_MODEL_DIR: ${{ github.workspace }}/scripts/models-voxcpm2
          VOXCPM2_SYNTH_WAV:       ${{ github.workspace }}/voxcpm2-synth.wav
          VOXCPM2_CLONE_WAV:       ${{ github.workspace }}/voxcpm2-clone.wav
        run: |
          export LD_LIBRARY_PATH="$PWD/litert:${LD_LIBRARY_PATH:-}"
          ctest --test-dir build --output-on-failure -R test_litert_models
          test -f voxcpm2-synth.wav
          test -f voxcpm2-clone.wav
          ls -la voxcpm2-synth.wav voxcpm2-clone.wav

      # --- Semantic round-trip: feed the WAV through our own Parakeet ORT
      # CLI and assert the input phrase shows up in the transcript. This is
      # the strong assertion — garbled babble would not match.
      #
      # speech_transcribe uses the VAD-driven streaming pipeline: it splits
      # the WAV into speech segments and prints each as a separate '[speech]
      # STT: text=...' line on stderr. We grep across all segments (stdout
      # holds only the final one). Set +e because the binary may exit
      # non-zero on teardown after the synthesised utterance.
      - name: ASR round-trip (Parakeet ORT)
        run: |
          export LD_LIBRARY_PATH="$PWD/ort-linux/lib:${LD_LIBRARY_PATH:-}"
          set +e
          output="$(./build/examples/linux/speech_transcribe scripts/models voxcpm2-synth.wav 2>&1)"
          set -e
          echo "$output"
          # Test phrase is "The quick brown fox jumps over the lazy dog".
          # Require at least 6 content words — Silero may split the
          # utterance differently from speech to speech.
          lower="$(echo "$output" | tr '[:upper:]' '[:lower:]')"
          missing=""
          for w in quick brown fox jumps lazy dog; do
              if ! echo "$lower" | grep -q "$w"; then
                  missing="$missing $w"
              fi
          done
          if [ -n "$missing" ]; then
              echo "FAIL: transcript missing words:$missing" >&2
              exit 1
          fi
          echo "OK: all required words present in transcript"

      # --- Same round-trip for the voice-cloned output (test_litert_models'
      # clone test conditions on the fixture clip, then synthesises the phrase
      # in that voice). Proves the audio_encoder → prefill conditioning path
      # produces intelligible cloned speech, not just non-silent audio.
      - name: ASR round-trip — cloned voice (Parakeet ORT)
        run: |
          export LD_LIBRARY_PATH="$PWD/ort-linux/lib:${LD_LIBRARY_PATH:-}"
          set +e
          output="$(./build/examples/linux/speech_transcribe scripts/models voxcpm2-clone.wav 2>&1)"
          set -e
          echo "$output"
          lower="$(echo "$output" | tr '[:upper:]' '[:lower:]')"
          missing=""
          for w in quick brown fox jumps lazy dog; do
              if ! echo "$lower" | grep -q "$w"; then
                  missing="$missing $w"
              fi
          done
          if [ -n "$missing" ]; then
              echo "FAIL: cloned transcript missing words:$missing" >&2
              exit 1
          fi
          echo "OK: cloned voice transcript intelligible"
